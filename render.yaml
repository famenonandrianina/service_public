services:
  - type: web
    name: service-pu-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # ← à renseigner manuellement dans le dashboard Render
      - key: JWT_SECRET
        sync: false   # ← à renseigner manuellement dans le dashboard Render
      - key: JWT_EXPIRE
        value: 1d
      - key: CLIENT_URL
        value: https://service-public-two.vercel.app
