<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactez-nous | Dembéni</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar glass">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-landmark"></i>
                <div class="logo-text">
                    <span class="brand">DEMBÉNI</span>
                    <span class="sub-brand">Services Publics</span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="register.html" class="btn-register-nav glass">S'inscrire</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding-top: 150px;">
        <div class="section-header" data-aos="fade-down">
            <h1 class="section-title">Formulaire de Contact</h1>
            <p>Notre équipe vous répond sous 48h ouvrées.</p>
        </div>

        <div class="form-container glass shadow-glow" data-aos="zoom-in">
            <form id="contactForm" onsubmit="return validateContactForm()">
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="name">Nom Complet</label>
                        <input type="text" id="name" class="form-control" placeholder="Ex: Ali Mohamed">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Dembénimairie@gmail.com">
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="phone">Téléphone</label>
                        <input type="tel" id="phone" class="form-control" placeholder="0639...">
                    </div>
                    <div class="form-group">
                        <label for="service">Service Concerné</label>
                        <select id="service" class="form-control">
                            <option value="etat-civil">État Civil</option>
                            <option value="social">Social / Douka Latru</option>
                            <option value="urbanisme">Urbanisme</option>
                            <option value="autre">Autre demande</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Votre Message</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="Décrivez votre demande..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Envoyer le message <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </main>

    <footer class="glass">
        <div class="copyright">&copy; 2026 Mairie de Dembéni</div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
